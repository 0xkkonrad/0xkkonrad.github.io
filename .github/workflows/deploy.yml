name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # daily rebuild so the build-time Substack feed stays fresh
    - cron: '23 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.150.0
    steps:
      - name: Install Hugo
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Fetch Substack feed
        # Substack (Cloudflare) 403s requests from Actions/datacenter IPs, so
        # try the RSS first (in case that changes), then fall back to the Apps
        # Script proxy (Google IPs, not blocked; 5 items). Non-fatal: the feed
        # partial renders a plain Substack link if both files are missing.
        run: |
          if curl -fsSL --retry 2 \
              -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
              https://kkonrad.substack.com/feed -o assets/substack.rss.xml; then
            echo "RSS fetched: $(wc -c < assets/substack.rss.xml) bytes"
          elif curl -fsSL --retry 3 --retry-delay 5 \
              "https://script.google.com/macros/s/AKfycbzAARQMtIYZBdL-fAbio7Q5BsYb5ToiwuStw7MDKWmIbyaSfcaTT2ASifdINXKq-NX9/exec" \
              -o assets/substack.json; then
            echo "Apps Script JSON fetched: $(wc -c < assets/substack.json) bytes"
          else
            echo "::warning::Substack feed fetch failed — building with fallback link"
          fi
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

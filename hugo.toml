baseURL = "https://kkonrad.com/"
languageCode = "en-us"
title = "Konrad Urban"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[pagination]
  pagerSize = 20

[minify]
  disableXML = true
  minifyOutput = true

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  env = "production"
  description = "Konrad Urban — co-founder of Peanut. Writing on onchain payments, fintech, and other things."
  author = "Konrad Urban"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  ShowToc = true
  TocOpen = false
  disableSpecial1stPost = true
  disableScrollToTop = false
  hidemeta = false
  hideSummary = false
  comments = false
  mainSections = ["writing"]

  [params.homeInfoParams]
    Title = "henlo fren"
    Content = """
I'm Konrad. I co-founded [Peanut](https://peanut.me).

Find me on [LinkedIn](https://www.linkedin.com/in/konrad-urban/), [twitter](https://twitter.com/0xkkonrad), [Substack](https://kkonrad.substack.com/).

I also (co-)founded:
- 2020 — [Let's Phi](https://letsphi.com/) — a community of academic philosophers with non-academic careers (1.8k members)
- 2020 — [Knit](http://knitvideo.com/) — a failed virtual events B2B SaaS (10k+ users, with [Orest](https://tarasiuk.me/about-orest))
- 2016 — [Open Blues](http://www.openblues.pl/) — a blues dance festival (sold out every year, with Isabella Larsen)
- 2016 — [Radowid](http://radowid.com/) — a failed luxury silk brand

"""

  [params.assets]
    disableHLJS = false
    favicon = ""
    favicon16x16 = ""
    favicon32x32 = ""
    apple_touch_icon = ""
    safari_pinned_tab = ""

[[menu.main]]
  identifier = "writing"
  name = "writing"
  url = "/writing/"
  weight = 10

[[menu.main]]
  identifier = "substack"
  name = "substack"
  url = "/substack/"
  weight = 15

[[menu.main]]
  identifier = "talks"
  name = "talks"
  url = "/talks/"
  weight = 20

[[menu.main]]
  identifier = "misc"
  name = "misc"
  url = "/misc/"
  weight = 30

[[menu.main]]
  identifier = "search"
  name = "search"
  url = "/search/"
  weight = 50

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    style = "monokai"
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
